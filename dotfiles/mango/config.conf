# More option see https://github.com/DreamMaoMao/mango/wiki/

# Window effect
blur=0
blur_layer=0
blur_optimized=0
blur_params_num_passes = 2
blur_params_radius = 5
blur_params_noise = 0.02
blur_params_brightness = 0.9
blur_params_contrast = 0.9
blur_params_saturation = 1.2

shadows = 0
layer_shadows = 0
shadow_only_floating = 1
shadows_size = 10
shadows_blur = 15
shadows_position_x = 0
shadows_position_y = 0

border_radius=5
no_radius_when_single=0
focused_opacity=1.0
unfocused_opacity=1.0

# Animation Configuration(support type:zoom,slide)
# tag_animation_direction: 0-horizontal,1-vertical
animations=1
layer_animations=1
animation_type_open=slide
animation_type_close=slide
animation_fade_in=1
animation_fade_out=1
tag_animation_direction=1
zoom_initial_ratio=0.3
zoom_end_ratio=0.8
fadein_begin_opacity=0.5
fadeout_begin_opacity=0.8
animation_duration_move=500
animation_duration_open=400
animation_duration_tag=350
animation_duration_close=800
animation_duration_focus=0
animation_curve_open=0.46,1.0,0.29,1
animation_curve_move=0.46,1.0,0.29,1
animation_curve_tag=0.46,1.0,0.29,1
animation_curve_close=0.08,0.92,0,1
animation_curve_focus=0.46,1.0,0.29,1
animation_curve_opafadeout=0.5,0.5,0.5,0.5
animation_curve_opafadein=0.46,1.0,0.29,1

# Scroller Layout Setting
scroller_structs=20
scroller_default_proportion=0.8
scroller_focus_center=0
scroller_prefer_center=0
edge_scroller_pointer_focus=1
scroller_default_proportion_single=1.0
scroller_proportion_preset=0.5,0.8,1.0

# Master-Stack Layout Setting
new_is_master=1
default_mfact=0.55
default_nmaster=1
smartgaps=0

# Overview Setting
hotarea_size=10
enable_hotarea=0
ov_tab_mode=1
overviewgappi=5
overviewgappo=30

# Misc
no_border_when_single=0
axis_bind_apply_timeout=100
focus_on_activate=1
idleinhibit_ignore_visible=0
sloppyfocus=1
warpcursor=1
focus_cross_monitor=0
focus_cross_tag=0
enable_floating_snap=0
snap_distance=30
cursor_size=24
drag_tile_to_tile=1
allow_tearing=1

# keyboard
repeat_rate=25
repeat_delay=600
numlockon=0
xkb_rules_layout=us

# Trackpad
# need relogin to make it apply
disable_trackpad=0
tap_to_click=1
tap_and_drag=1
drag_lock=1
trackpad_natural_scrolling=0
disable_while_typing=0
left_handed=0
middle_button_emulation=1
swipe_min_threshold=1

# mouse
# need relogin to make it apply
mouse_natural_scrolling=0

# Appearance
gappih=6
gappiv=6
gappoh=8
gappov=8
scratchpad_width_ratio=0.8
scratchpad_height_ratio=0.9
borderpx=3
#0x8839efff
#0x444444ff
#0xc9b890ff
#0x89aa61ff

# layout support:
# tile,scroller,grid,deck,monocle,center_tile,vertical_tile,vertical_scroller
tagrule=id:1,layout_name:tile
tagrule=id:2,layout_name:tile
tagrule=id:3,layout_name:tile
tagrule=id:4,layout_name:tile
tagrule=id:5,layout_name:tile
tagrule=id:6,layout_name:tile
tagrule=id:7,layout_name:tile
tagrule=id:8,layout_name:tile
tagrule=id:9,layout_name:tile

# Key Bindings
# key name refer to `xev` or `wev` command output,
# mod keys name: super,ctrl,alt,shift,none

# reload config
bind=SUPER+SHIFT,r,reload_config

# menu and terminal
bind=SUPER,space,spawn,rofi -show drun
bind=SUPER,Return,spawn,foot

# exit
bind=SUPER+SHIFT,m,quit
bind=SUPER,q,killclient,

# switch window focus
bind=Alt,Tab,focusstack,next

# swap window
bind=SUPER,Up,exchange_client,up
bind=SUPER,Down,exchange_client,down
bind=SUPER,Left,exchange_client,left
bind=SUPER,Right,exchange_client,right

# switch window status
bind=SUPER,g,toggleglobal,
bind=SUPER,F5,toggleoverview,
bind=SUPER,backslash,togglefloating,
bind=SUPER,a,togglemaximizescreen,
bind=SUPER,f,togglefullscreen,
bind=SUPER,F4,togglefullscreen,
bind=SUPER+SHIFT,f,togglefakefullscreen,
bind=SUPER,i,minimized,
bind=SUPER,o,toggleoverlay,

# tag switch
bind=SUPER+SHIFT,Left,viewtoleft,0
bind=CTRL,Left,viewtoleft_have_client,0
bind=SUPER+SHIFT,Right,viewtoright,0
bind=CTRL,Right,viewtoright_have_client,0
bind=CTRL+SUPER,Left,tagtoleft,0
bind=CTRL+SUPER,Right,tagtoright,0

bind=Ctrl,1,view,1,0
bind=Ctrl,2,view,2,0
bind=Ctrl,3,view,3,0
bind=Ctrl,4,view,4,0
bind=Ctrl,5,view,5,0
bind=Ctrl,6,view,6,0
bind=Ctrl,7,view,7,0
bind=Ctrl,8,view,8,0
bind=Ctrl,9,view,9,0

# tag: move client to the tag and focus it
# tagsilent: move client to the tag and not focus it
# bind=Alt,1,tagsilent,1
bind=Alt,1,tag,1,0
bind=Alt,2,tag,2,0
bind=Alt,3,tag,3,0
bind=Alt,4,tag,4,0
bind=Alt,5,tag,5,0
bind=Alt,6,tag,6,0
bind=Alt,7,tag,7,0
bind=Alt,8,tag,8,0
bind=Alt,9,tag,9,0

# monitor switch
bind=alt+shift,Left,focusmon,left
bind=alt+shift,Right,focusmon,right
bind=SUPER+Alt,Left,tagmon,left
bind=SUPER+Alt,Right,tagmon,right

# gaps
bind=ALT+SHIFT,X,incgaps,1
bind=ALT+SHIFT,Z,incgaps,-1
bind=ALT+SHIFT,R,togglegaps

# movewin
bind=CTRL+Alt,Up,movewin,+0,-50
bind=CTRL+Alt,Down,movewin,+0,+50
bind=CTRL+Alt,Left,movewin,-50,+0
bind=CTRL+Alt,Right,movewin,+50,+0

# resizewin
bind=CTRL+Alt,Up,resizewin,+0,-50
bind=CTRL+Alt,Down,resizewin,+0,+50
bind=CTRL+Alt,Left,resizewin,-50,+0
bind=CTRL+Alt,Right,resizewin,+50,+0

# Mouse Button Bindings
# NONE mode key only work in ov mode
mousebind=SUPER,btn_left,moveresize,curmove
#mousebind=NONE,btn_middle,togglemaximizescreen,0
mousebind=SUPER,btn_right,moveresize,curresize
mousebind=NONE,btn_left,toggleoverview,1
mousebind=NONE,btn_right,killclient,0

# Axis Bindings
axisbind=SUPER,UP,viewtoleft_have_client
axisbind=SUPER,DOWN,viewtoright_have_client

# Screen Lock
switchbind=fold,spawn_shell,systemctl suspend

# Power Menu
bind=NONE,XF86PowerOff,spawn,qs -c noctalia-shell ipc call sessionMenu toggle

# layer rule
layerrule=animation_type_open:zoom,layer_name:rofi
layerrule=animation_type_close:zoom,layer_name:rofi

# Brightness
bindl=NONE,XF86MonBrightnessUp,spawn,brightnessctl set +5%
bindl=NONE,XF86MonBrightnessDown,spawn,brightnessctl set 5%-

# Volume
bindl=NONE,XF86AudioRaiseVolume,spawn,wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindl=NONE,XF86AudioLowerVolume,spawn,wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl=NONE,XF86AudioMute,spawn,wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# Media Keys
bind=NONE,XF86AudioPrev,spawn,playerctl previous
bind=NONE,XF86AudioPlay,spawn,playerctl play-pause
bind=NONE,XF86AudioNext,spawn,playerctl next

# Idle
exec-once=hypridle

# XDG-Portal
exec-once=dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP=wlroots

# Screen
monitorrule=name:eDP-1,width:3840,height:2160,refresh:60,x:0,y:0,scale:2,

# mpris-proxy - the shi that makes airpods controls work
exec-once=mpris-proxy

# Permission authentication (the lil popup that asks for passwd)
exec-once=eval "$(/run/current-system/sw/bin/ls -d /nix/store/*polkit-gnome-[0-9]* | grep -v '.drv' | head -n 1)/libexec/polkit-gnome-authentication-agent-1 &"
exec-once=xhost +SI:localuser:root

# window rule for waybar modules menus
windowrule=isfloating:1,isoverlay:1,width:675,height:500,appid:waybar_network
windowrule=isfloating:1,isoverlay:1,width:650,height:500,appid:waybar_bluetooth
windowrule=isfloating:1,isoverlay:1,width:650,height:500,appid:waybar_clipboard
windowrule=isfloating:1,isoverlay:1,width:600,height:500,appid:waybar_audio_mixer

# Waybar & others sh
exec-once=waybar
exec-once=swaybg --image ~/Pictures/Wallpapers/flowering-rain.png

# clipboard
exec-once=clipse -listen

# Source theme
source = ~/.config/mango/theme.conf

# Screenshot
bind=NONE,Print,spawn,~/.config/mango/screenshot.sh
windowrule=isfloating:1,isoverlay:1,title:satty

# notification daemon
exec-once=systemctl --user start swaync.service

